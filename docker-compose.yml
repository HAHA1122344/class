services:
  openmaic:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
    dns:
      - 223.5.5.5
      - 114.114.114.114
    volumes:
      - ./.next/standalone/github/class:/app
      - ./.next/static:/app/.next/static
      - openmaic-data:/app/data
    restart: unless-stopped

volumes:
  openmaic-data:
